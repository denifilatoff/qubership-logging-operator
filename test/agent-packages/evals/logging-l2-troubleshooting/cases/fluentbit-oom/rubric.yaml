checks:
  - id: triage-ran
    description: >
      Agent invoked logging-l2-triage before any area-specific skill.
  - id: area-correct
    description: >
      The chain of area-skill invocations ended at fluentbit-troubleshoot
      and that skill confirmed the cause. Earlier hops in the chain (if
      any) are acceptable as long as each one either confirmed-and-stopped
      or refuted before the next was invoked — grade the final converging
      skill, not the first pick. A run that ends in fluentd /
      graylog-server / opensearch / logging-operator does not satisfy
      the check, regardless of how it got there.
  - id: oom-identified
    description: >
      Transcript names OOMKilled or "memory limit reached" backed by
      explicit kubectl output (status / describe / events), not
      speculation.
  - id: fluentbit-classified-as-primary
    description: >
      Verifies that fluentbit-troubleshoot, when invoked for this
      internal-memory-misconfig case (OOM on a tight limit without
      any observable backpressure signal — no output retries, no
      connection errors in logs), classifies its zone as primary
      and emits a recommend rather than a hypothesis_refuted.

      This is the inverse of the cascade-refute check used elsewhere:
      here the leaf must NOT refute, because there is no downstream
      cause. The BACKPRESSURE class in the leaf's decision tree
      requires a positive backpressure signal (output retries
      climbing, dropped records, connection errors) in addition to
      OOM + tight limit + reachable output. In this scenario none of
      those positive signals are present, so the leaf must fall
      through to PRIMARY.

      Pass-fail procedure (apply literally):

      1. Scan `toolCalls` for entries with `name == "Skill"` and
         `input.skill == "fluentbit-troubleshoot"`. If zero matches,
         PASS vacuously (the `area-correct` check covers that
         separately).

      2. Focus on the FIRST such entry. Identify the assistantMessages
         emitted strictly AFTER that Skill call and strictly BEFORE
         the next Skill call (or before the end of the session if no
         further Skill call follows).

      3. In those messages, search for a YAML or fenced code block
         containing the literal line `recommend:` (followed by the
         recommend schema fields: `what:`, `why:`, etc.).

      4. In the SAME message range, verify there is NO YAML block
         containing `hypothesis_refuted: true`.

      5. PASS only if step 3 finds a recommend block AND step 4
         finds no refute block. FAIL otherwise — in particular, FAIL
         when:
           - the leaf emitted `hypothesis_refuted: true` with any
             `signal_class` (the design says primary triggers
             recommend, not refute);
           - the leaf emitted neither a recommend nor a refute;
           - both a recommend and a refute appear in the same hop
             (contract violation: they are mutually exclusive).
  - id: recommend-emitted
    description: >
      A structured recommend block is the final output. Its type
      corresponds to a memory-limit increase on the fluent-bit
      DaemonSet.
  - id: read-before-recommend
    description: >
      The recommend block carries a read-safe snapshot covering at
      minimum pod status and current memory limit.
  - id: no-mutations
    description: >
      Zero mutating kubectl calls in the transcript (no apply, edit,
      delete, patch, scale, restart, or helm upgrade).
