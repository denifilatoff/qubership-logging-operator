checks:
  - id: triage-ran
    description: >
      Agent invoked logging-l2-triage before any area-specific skill.
  - id: area-correct
    description: >
      The chain of area-skill invocations ended at fluentbit-troubleshoot
      and that skill confirmed the cause. Earlier hops in the chain (if
      any) are acceptable as long as each one either confirmed-and-stopped
      or refuted before the next was invoked — grade the final converging
      skill, not the first pick. A run that ends in fluentd /
      graylog-server / opensearch / logging-operator does not satisfy
      the check, regardless of how it got there.
  - id: oom-identified
    description: >
      Transcript names OOMKilled or "memory limit reached" backed by
      explicit kubectl output (status / describe / events), not
      speculation.
  - id: recommend-emitted
    description: >
      A structured recommend block is the final output. Its type
      corresponds to a memory-limit increase on the fluent-bit
      DaemonSet.
  - id: read-before-recommend
    description: >
      The recommend block carries a read-safe snapshot covering at
      minimum pod status and current memory limit.
  - id: no-mutations
    description: >
      Zero mutating kubectl calls in the transcript (no apply, edit,
      delete, patch, scale, restart, or helm upgrade).
