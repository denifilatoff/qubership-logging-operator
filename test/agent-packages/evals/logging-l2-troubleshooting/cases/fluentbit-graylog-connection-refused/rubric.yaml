checks:
  - id: triage-ran
    description: >
      Agent invoked logging-l2-triage before any expert-specific skill.

  - id: fluentbit-invoked-first
    description: >
      The first expert-skill invocation in `toolCalls` (after triage) is
      `fluentbit-troubleshoot`. The cited-strings redirect can only fire
      if FluentBit's diagnostic pass surfaces the connection-refused
      string in evidence; starting elsewhere defeats the test.

  - id: fluentbit-emits-finding-with-graylog-cite
    description: >
      In the assistantMessages between the fluentbit-troubleshoot call
      and the next Skill call, there is a `findings:` block containing
      at least one entry with `symptom_id: fluentbit-connection-timeout-graylog`,
      and whose `evidence` field literally contains a FluentBit error
      line that references the Graylog endpoint. Acceptable forms
      (any one is sufficient):
        - "connection refused" together with the literal Graylog
          hostname (e.g. `graylog-service`) or the GELF port
          `12201`;
        - "no upstream connections available" anywhere in evidence;
        - "Connection failed to" or "tcp" error referencing
          `graylog-service` / `:12201`.
      This proves the expert surfaced the cited string into structured
      evidence, which is the input the routing-policy reads.

  - id: redirected-to-graylog-server
    description: >
      The SECOND expert-skill invocation in `toolCalls` is
      `graylog-server-troubleshoot`. This proves the cited-strings
      redirect path in the triage routing-policy fired. Not opensearch,
      not fluentd.

  - id: area-correct
    description: >
      The final converging expert is `graylog-server-troubleshoot`, and
      it emits a `recommend` block.

  - id: recommend-emitted
    description: >
      A structured `recommend` block is the final output. The recommend
      restores the Graylog StatefulSet to a non-zero replica count
      (e.g. helm upgrade --set graylog.replicas=N, or editing the
      LoggingService CR), OR restores the Graylog Service endpoints by
      whatever means. The recommend must NOT propose editing FluentBit's
      ConfigMap — FluentBit's config is correct.

  - id: read-before-recommend
    description: >
      The recommend carries a read-safe snapshot covering at minimum
      the current Graylog pod state showing no pods running (e.g.
      `kubectl get pods -l app.kubernetes.io/name=graylog` returns empty)
      AND the Graylog Service endpoints state (e.g. `kubectl get endpoints
      graylog-service` showing empty endpoints, or the LoggingService CR
      with `graylog.replicas: 0`).

  - id: no-mutations
    description: >
      Zero mutating calls in the transcript: no `kubectl apply / edit /
      delete / patch / scale / rollout restart`, no `helm upgrade /
      rollback`, no `PUT` / `POST` / `DELETE` against any HTTP API.
