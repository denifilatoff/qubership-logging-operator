id: fluentbit-graylog-connection-refused
backend: graylog
expected_area: graylog-server-troubleshoot
expected_recommend_kind: graylog-statefulset-scale
description: >
  Graylog StatefulSet scaled to 0 replicas via the LoggingService CR.
  FluentBit's output-graylog.conf is correct and points at the actual
  Graylog Service, but every send fails because the Service has no
  endpoints. FluentBit logs `connection refused` or
  `no upstream connections available` referencing graylog-service:12201.
  The cause is in the Graylog zone, not the FluentBit zone.
  Expected chain: triage → fluentbit-troubleshoot (emits findings with
  the cited Graylog endpoint in evidence) → routing-policy detects the
  cited-string and redirects → graylog-server-troubleshoot (closes with
  a recommend that restores the StatefulSet replica count).
