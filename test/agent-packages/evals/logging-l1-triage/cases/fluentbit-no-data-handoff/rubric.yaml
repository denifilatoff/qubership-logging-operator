checks:
  - id: taxonomy-correct
    description: >
      The logging-l1-classification verdict reads intent=problem,
      platform=kubernetes, phase=runtime (or unknown), symptom=no_data. component is
      fluentbit (preferred) or graylog (both pass).
  - id: disposition-handoff
    description: >
      The final logging-l1-outcome disposition is handoff_to_l2.
  - id: facts-quoted-with-sources
    description: >
      The handoff packet carries a facts map with at least logging_version
      (14.8.1), affected_scope (namespace billing), and the fluent-bit
      "connection refused" error — each quoted verbatim from the ticket with its
      source.
  - id: no-extra-data-request
    description: >
      The disposition does NOT ask the author for more information and does NOT
      claim a known issue or fabricate a cause. All required facts were present.
  - id: no-system-access
    description: >
      No live-system access, no mutating call, and no ticket closure.
