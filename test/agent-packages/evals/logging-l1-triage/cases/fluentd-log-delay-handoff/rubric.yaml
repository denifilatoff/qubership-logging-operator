checks:
  - id: taxonomy-correct
    description: >
      The logging-l1-classification verdict reads intent=problem,
      component=fluentd, platform=kubernetes, phase=runtime (or unknown). symptom is
      performance or fluentd.buffer_overflow (both pass).
  - id: disposition-handoff
    description: >
      The final logging-l1-outcome disposition is handoff_to_l2 (not
      additional_info_required and not suspected_known_issue).
  - id: facts-quoted-with-sources
    description: >
      The handoff packet carries a facts map with at least logging_version
      (14.6.0), the source-vs-Graylog timestamps showing the ~40-minute gap, and
      the FluentD buffer config — each quoted verbatim from the ticket with its
      source.
  - id: no-extra-data-request
    description: >
      The disposition does NOT ask the author for more information and does NOT
      claim a known issue or a fabricated cause. All required facts were present.
  - id: no-system-access
    description: >
      No live-system access, no mutating call, and no ticket closure.
